<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found — A Celebration, Just for You</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{ box-sizing: border-box; }
  html,body{ height: 100%; margin: 0; }
  body{
    display: flex; align-items: center; justify-content: center; text-align: center;
    background: radial-gradient(circle at 50% 30%, #17171D 0%, #0A0A0E 70%);
    color: #fff; font-family: 'Inter', sans-serif; padding: 24px;
  }
  .wrap{ max-width: 420px; }
  .glyph{ font-size: 44px; color: #FFB020; margin-bottom: 20px; }
  h1{ font-family: 'Space Grotesk', sans-serif; font-size: 28px; margin: 0 0 12px; }
  p{ color: rgba(255,255,255,0.65); font-size: 15px; line-height: 1.6; margin: 0 0 28px; }
  a{
    display: inline-block; padding: 14px 30px; border-radius: 999px; text-decoration: none;
    background: linear-gradient(120deg, #00E676, #FFB020); color: #fff; font-weight: 600; font-size: 14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="glyph">✦</div>
    <h1>This page took a detour</h1>
    <p>The page you're looking for doesn't exist — but the celebration is still happening.</p>
    <a href="/">Back to the celebration</a>
  </div>
</body>
</html>
